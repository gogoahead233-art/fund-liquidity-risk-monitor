{% extends "base.html" %}

{% block title %}Fixed Income Plus Basic Info - Fund Risk Monitor{% endblock %}

{% block extra_css %}
<style>
    .table-fixed { table-layout: fixed; }
    .table-fixed th, .table-fixed td { word-wrap: break-word; overflow-wrap: break-word; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-3">
    <h4 class="mb-4"><i class="fas fa-chart-line text-info me-2"></i>Fixed Income Plus Basic Info</h4>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Fund Name</label>
                    <select id="fundSelect" class="form-select"><option value="">-- Select Fund --</option></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <select id="dateSelect" class="form-select" disabled><option value="">-- Select Fund First --</option></select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button id="queryBtn" class="btn btn-info text-white"><i class="fas fa-calculator me-1"></i>Calculate</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resultsPanel" style="display:none;">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>Basic Indicator Results</h5>
            </div>
            <div class="card-body" id="resultsContent"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    'use strict';
    var fundEl = document.getElementById('fundSelect');
    var dateEl = document.getElementById('dateSelect');

    loadFunds();

    fundEl.addEventListener('change', function() {
        if (this.value) loadDates(this.value);
        else { dateEl.innerHTML = '<option value="">-- Select Fund First --</option>'; dateEl.disabled = true; }
    });

    document.getElementById('queryBtn').addEventListener('click', doQuery);

    function loadFunds() {
        fetch('{{ url_for("warning.api_fund_names") }}?type=fixed_income_plus')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success && data.data) {
                    fundEl.innerHTML = '<option value="">-- Select Fund --</option>';
                    data.data.forEach(function(n) { fundEl.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
                }
            }).catch(function() { fundEl.innerHTML = '<option value="">Failed to load</option>'; });
    }

    function loadDates(fundName) {
        dateEl.innerHTML = '<option value="">Loading...</option>'; dateEl.disabled = true;
        fetch('{{ url_for("warning.api_dates") }}?type=fixed_income_plus&fund_name=' + encodeURIComponent(fundName))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success && data.data && data.data.length > 0) {
                    dateEl.innerHTML = '<option value="">-- Select Date --</option>';
                    data.data.forEach(function(d) { dateEl.innerHTML += '<option value="' + d + '">' + d + '</option>'; });
                    dateEl.disabled = false;
                } else { dateEl.innerHTML = '<option value="">No dates available</option>'; }
            }).catch(function() { dateEl.innerHTML = '<option value="">Failed to load</option>'; });
    }

    function doQuery() {
        var fundName = fundEl.value, date = dateEl.value;
        if (!fundName || !date) { alert('Please select both fund name and date.'); return; }

        var panel = document.getElementById('resultsPanel'), content = document.getElementById('resultsContent');
        panel.style.display = 'block';
        content.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-info" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2">Calculating data, please wait...</p></div>';

        fetch('{{ url_for("warning.api_fip_calculate") }}', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fund_name: fundName, date: date })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) displayResult(data.basic_info);
            else content.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>' + (data.message || 'Calculation failed') + '</div>';
        })
        .catch(function(err) { content.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>Calculation failed: ' + err.message + '</div>'; });
    }

    function displayResult(r) {
        if (!r) { document.getElementById('resultsContent').innerHTML = '<div class="alert alert-info"><i class="fas fa-info-circle me-2"></i>No data found</div>'; return; }

        var fmtDate = function(d) { try { var dt = new Date(d); if (!isNaN(dt)) return dt.toISOString().slice(0, 10); } catch(e) {} return d || '-'; };
        var fmtPct = function(v) { if (v === null || v === undefined || v === '') return '-'; var n = parseFloat(v); return isNaN(n) ? '-' : (n * 100).toFixed(2) + '%'; };
        var fmtNum = function(v, d) { d = d || 2; if (v === null || v === undefined || v === '') return '-'; var n = parseFloat(v); return isNaN(n) ? '-' : n.toFixed(d); };

        var fn = r.fund_name || r['\u4ea7\u54c1\u540d\u79f0'] || '-';
        var td = r.trade_date || r['\u4ea4\u6613\u65e5\u671f'] || '-';

        document.getElementById('resultsContent').innerHTML =
            '<div class="row mb-3"><div class="col-md-12"><h6 class="text-primary mb-3"><i class="fas fa-building me-2"></i>Fund: ' + fn + ' <span class="ms-3"><i class="fas fa-calendar-alt me-2"></i>Date: ' + fmtDate(td) + '</span></h6></div></div>' +
            '<div class="row">' +
            '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-header bg-info text-white"><h6 class="mb-0"><i class="fas fa-chart-pie me-2"></i>Asset Allocation</h6></div><div class="card-body"><table class="table table-sm table-borderless"><tbody>' +
            '<tr><td style="width:60%" class="text-muted">Net Asset (Billion)</td><td class="text-end fw-bold">' + fmtNum(r.net_asset_billion || r['\u51c0\u8d44\u4ea7(\u4ebf)']) + '</td></tr>' +
            '<tr><td class="text-muted">Bond Ratio (excl. Convertible)</td><td class="text-end fw-bold text-primary">' + fmtPct(r.bond_ratio || r['\u503a\u5238\u6295\u8d44(\u4e0d\u542b\u53ef\u8f6c\u503a)\u5360\u6bd4']) + '</td></tr>' +
            '<tr><td class="text-muted">Convertible Bond Ratio</td><td class="text-end fw-bold text-primary">' + fmtPct(r.convertible_bond_ratio || r['\u53ef\u8f6c\u503a\u6295\u8d44\u5360\u6bd4']) + '</td></tr>' +
            '<tr><td class="text-muted">Stock Ratio</td><td class="text-end fw-bold text-primary">' + fmtPct(r.stock_ratio || r['\u80a1\u7968\u6295\u8d44\u5360\u6bd4']) + '</td></tr>' +
            '<tr><td class="text-muted">Demand Deposit Ratio</td><td class="text-end fw-bold text-success">' + fmtPct(r.demand_deposit_ratio || r['\u6d3b\u671f\u5b58\u6b3e\u6295\u8d44\u5360\u6bd4']) + '</td></tr>' +
            '<tr><td class="text-muted">Reverse Repo Ratio</td><td class="text-end fw-bold text-success">' + fmtPct(r.repo_ratio || r['\u9006\u56de\u8d2d\u6295\u8d44\u5360\u6bd4']) + '</td></tr>' +
            '</tbody></table></div></div></div>' +
            '<div class="col-md-6"><div class="card shadow-sm h-100"><div class="card-header bg-warning text-dark"><h6 class="mb-0"><i class="fas fa-chart-line me-2"></i>Risk Metrics</h6></div><div class="card-body"><table class="table table-sm table-borderless"><tbody>' +
            '<tr><td style="width:60%" class="text-muted">Stock NAV Volatility</td><td class="text-end fw-bold text-danger">' + fmtPct(r.stock_volatility || r['\u80a1\u7968\u6301\u4ed3\u51c0\u503c\u6ce2\u52a8\u7387']) + '</td></tr>' +
            '<tr><td class="text-muted">Stock Beta</td><td class="text-end fw-bold text-danger">' + fmtNum(r.stock_beta || r['\u80a1\u7968\u6301\u4ed3beta\u503c'], 4) + '</td></tr>' +
            '<tr><td class="text-muted">Pure Bond Premium Avg (Convertible)</td><td class="text-end fw-bold">' + fmtPct(r.pure_bond_premium_avg || r['\u7eaf\u503a\u6ea2\u4ef7\u7387(\u53ef\u8f6c\u503a)\u52a0\u6743\u5e73\u5747']) + '</td></tr>' +
            '<tr><td class="text-muted">Equity Premium Avg (Convertible)</td><td class="text-end fw-bold">' + fmtPct(r.equity_premium_avg || r['\u8f6c\u80a1\u6ea2\u4ef7\u7387(\u53ef\u8f6c\u503a)\u52a0\u6743\u5e73\u5747']) + '</td></tr>' +
            '<tr><td class="text-muted">Portfolio Duration</td><td class="text-end fw-bold">' + fmtNum(r.portfolio_duration || r['\u7ec4\u5408\u4e45\u671f'], 2) + '</td></tr>' +
            '</tbody></table></div></div></div></div>' +
            '<div class="alert alert-info mt-3"><i class="fas fa-info-circle me-2"></i><strong>Note:</strong> Please verify the calculated results carefully.</div>';
    }
})();
</script>
{% endblock %}
