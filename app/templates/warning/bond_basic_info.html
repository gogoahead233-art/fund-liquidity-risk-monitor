{% extends "base.html" %}

{% block title %}Bond Fund Basic Info - Fund Risk Monitor{% endblock %}

{% block extra_css %}
<style>
    .indicator-item { padding: 0.75rem; border-bottom: 1px solid #dee2e6; transition: background-color 0.2s; }
    .indicator-item:hover { background-color: #f8f9fa; }
    .indicator-label { font-weight: 600; color: #495057; }
    .indicator-value { color: #0d6efd; font-size: 1.1rem; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-3">
    <h4 class="mb-4"><i class="fas fa-info-circle text-primary me-2"></i>Bond Fund Basic Info</h4>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Fund Name</label>
                    <select id="fundSelect" class="form-select"><option value="">-- Select Fund --</option></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <select id="dateSelect" class="form-select" disabled><option value="">-- Select Fund First --</option></select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button id="queryBtn" class="btn btn-primary"><i class="fas fa-search me-1"></i>Query</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resultsPanel" style="display:none;">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>Query Results</h5>
            </div>
            <div class="card-body" id="resultsContent"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    'use strict';
    var fundEl = document.getElementById('fundSelect');
    var dateEl = document.getElementById('dateSelect');

    loadFunds();

    fundEl.addEventListener('change', function() {
        if (this.value) loadDates(this.value);
        else { dateEl.innerHTML = '<option value="">-- Select Fund First --</option>'; dateEl.disabled = true; }
    });

    document.getElementById('queryBtn').addEventListener('click', doQuery);

    function loadFunds() {
        fetch('{{ url_for("warning.api_fund_names") }}?type=bond')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success && data.data) {
                    fundEl.innerHTML = '<option value="">-- Select Fund --</option>';
                    data.data.forEach(function(n) { fundEl.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
                }
            }).catch(function() { fundEl.innerHTML = '<option value="">Failed to load</option>'; });
    }

    function loadDates(fundName) {
        dateEl.innerHTML = '<option value="">Loading...</option>'; dateEl.disabled = true;
        fetch('{{ url_for("warning.api_dates") }}?type=bond&fund_name=' + encodeURIComponent(fundName))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success && data.data && data.data.length > 0) {
                    dateEl.innerHTML = '<option value="">-- Select Date --</option>';
                    data.data.forEach(function(d) { dateEl.innerHTML += '<option value="' + d + '">' + d + '</option>'; });
                    dateEl.disabled = false;
                } else { dateEl.innerHTML = '<option value="">No dates available</option>'; }
            }).catch(function() { dateEl.innerHTML = '<option value="">Failed to load</option>'; });
    }

    function doQuery() {
        var fundName = fundEl.value, date = dateEl.value;
        if (!fundName || !date) { alert('Please select both fund name and date.'); return; }

        var panel = document.getElementById('resultsPanel'), content = document.getElementById('resultsContent');
        panel.style.display = 'block';
        content.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2">Calculating data, please wait...</p></div>';

        fetch('{{ url_for("warning.api_bond_calculate") }}', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fund_name: fundName, date: date })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) displayResult(data.basic_info, fundName, date);
            else content.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>' + (data.message || 'Query failed') + '</div>';
        })
        .catch(function(err) { content.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>Query failed: ' + err.message + '</div>'; });
    }

    function displayResult(r, fundName, date) {
        if (!r) { document.getElementById('resultsContent').innerHTML = '<div class="alert alert-info"><i class="fas fa-info-circle me-2"></i>No data found</div>'; return; }

        var liqTable = '';
        if (r.liquidity_tiers && r.liquidity_tiers.length > 0) {
            liqTable = '<h6 class="mt-3 mb-2">Liquidity Tiers:</h6><table class="table table-bordered table-sm"><thead class="table-light"><tr><th>Tier</th><th>NAV Ratio</th></tr></thead><tbody>';
            r.liquidity_tiers.forEach(function(t) { liqTable += '<tr><td><strong>' + t.tier + '</strong></td><td>' + fmtPct(t.ratio) + '</td></tr>'; });
            liqTable += '</tbody></table>';
        }

        document.getElementById('resultsContent').innerHTML =
            '<div class="mb-4"><h5 class="mb-3">Fund: ' + fundName + ' | Date: ' + date + '</h5><div class="row"><div class="col-md-6">' +
            item('Net Asset (Billion)', fmtNum(r.net_asset_billion)) +
            item('Leverage Ratio', fmtNum(r.leverage_ratio)) +
            item('Static Yield (%)', fmtPct(r.static_yield)) +
            item('Duration Before Leverage', fmtNum(r.duration_before_leverage)) +
            item('Duration After Leverage', fmtNum(r.duration_after_leverage)) +
            item('Portfolio Convexity', fmtNum(r.portfolio_convexity)) +
            item('BPV (10,000 CNY)', fmtNum(r.bpv_10000)) +
            '</div><div class="col-md-6">' +
            item('Maturity Under 1 Year (%)', fmtPct(r.maturity_under_1yr_ratio)) +
            item('Maturity 1-3 Years (%)', fmtPct(r.maturity_1to3yr_ratio)) +
            item('Maturity 3-5 Years (%)', fmtPct(r.maturity_3to5yr_ratio)) +
            item('Maturity Over 5 Years (%)', fmtPct(r.maturity_over_5yr_ratio)) +
            item('LQI Score', fmtNum(r.lqi_score)) +
            '<div class="col-12 mt-3">' + liqTable + '</div></div></div></div>';
    }

    function item(label, val) {
        return '<div class="indicator-item"><span class="indicator-label">' + label + ':</span><span class="indicator-value float-end">' + val + '</span></div>';
    }
    function fmtNum(v) { if (v === null || v === undefined) return '-'; return Number(v).toFixed(2); }
    function fmtPct(v) { if (v === null || v === undefined) return '-'; return (Number(v) * 100).toFixed(2) + '%'; }
})();
</script>
{% endblock %}
