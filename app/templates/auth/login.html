{% extends "base.html" %}

{% block title %}Login - Fund Liquidity Risk Monitoring System{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h3>
                <i class="fas fa-shield-alt me-2"></i>System Login
            </h3>
            <div class="subtitle">Fund Liquidity Risk Monitoring</div>
        </div>

        <div class="login-body">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-floating">
                    <input class="form-control" id="username" name="username" type="text" placeholder="Username" required />
                    <label for="username">
                        <i class="fas fa-user me-2"></i>Username
                    </label>
                </div>

                <div class="form-floating">
                    <input class="form-control" id="password" name="password" type="password" placeholder="Password" required />
                    <label for="password">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                </div>

                <button class="btn btn-login" type="submit">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
        </div>

        <div class="login-footer">
            <div class="security-badge">
                <i class="fas fa-lock"></i>
                Secure Connection
            </div>
            <div class="mt-2">
                <small class="text-muted">
                    Fund Liquidity Risk Monitoring System v1.0
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        overflow: hidden;
        max-width: 400px;
        width: 100%;
    }

    .login-header {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white;
        padding: 2rem;
        text-align: center;
        position: relative;
    }

    .login-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.1"/><circle cx="10" cy="60" r="0.5" fill="white" opacity="0.1"/><circle cx="90" cy="40" r="0.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
        opacity: 0.3;
    }

    .login-header h3 {
        margin: 0;
        font-weight: 600;
        font-size: 1.5rem;
        position: relative;
        z-index: 1;
    }

    .login-header .subtitle {
        margin-top: 0.5rem;
        opacity: 0.9;
        font-size: 0.9rem;
        position: relative;
        z-index: 1;
    }

    .login-body {
        padding: 2rem;
    }

    .form-floating {
        margin-bottom: 1.5rem;
    }

    .form-control {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 1rem 0.75rem;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #f8f9fa;
    }

    .form-control:focus {
        border-color: #2a5298;
        box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25);
        background: white;
    }

    .form-floating > label {
        color: #6c757d;
        font-weight: 500;
    }

    .btn-login {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        border: none;
        border-radius: 12px;
        padding: 0.75rem 2rem;
        font-weight: 600;
        font-size: 1rem;
        color: white;
        transition: all 0.3s ease;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }

    .btn-login:hover::before {
        left: 100%;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(30, 60, 114, 0.3);
        color: white;
    }

    .login-footer {
        text-align: center;
        padding: 1rem 2rem 2rem;
        color: #6c757d;
        font-size: 0.85rem;
    }

    .security-badge {
        display: inline-flex;
        align-items: center;
        background: rgba(30, 60, 114, 0.1);
        color: #1e3c72;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-size: 0.8rem;
        margin-top: 1rem;
    }

    .security-badge i {
        margin-right: 0.5rem;
    }

    @media (max-width: 576px) {
        .login-card {
            margin: 1rem;
            border-radius: 15px;
        }

        .login-header {
            padding: 1.5rem;
        }

        .login-body {
            padding: 1.5rem;
        }
    }
</style>
{% endblock %}
